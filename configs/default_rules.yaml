    enabled: true

  # Kernel — global

  - name: "OOM Killer Invoked"
    description: "Linux OOM killer terminated a process"
    pattern: 'Out of memory: Kill process (?P<pid>\d+) \((?P<process>[^)]+)\)'
    tags: ["syslog", "kernel"]
    severity: "high"
    enabled: true

  - name: "Kernel Panic"
    description: "Kernel panic detected in logs"
    pattern: 'Kernel panic'
    tags: ["syslog", "kernel"]
    severity: "critical"
    enabled: true

  - name: "Kernel BUG"
    description: "Kernel BUG() detected"
    pattern: 'kernel BUG at'
    tags: ["syslog", "kernel"]
    severity: "critical"
    enabled: true

  - name: "Disk I/O Error"
    description: "Block device reported an I/O error"
    pattern: '(?:end_request: I/O error|Buffer I/O error on device|SCSI error|ata\d+\.00: exception)'
    tags: ["syslog", "kernel"]
    severity: "high"
    enabled: true

  - name: "Filesystem Read-Only Remount"
    description: "Filesystem remounted read-only (indicates I/O errors)"
    pattern: 'EXT[234]-fs \([^)]+\): Remounting filesystem read-only'
    tags: ["syslog", "kernel"]
    severity: "critical"
    enabled: true

  - name: "Segfault"
    description: "Process segmentation fault"
    pattern: 'segfault at (?P<addr>\S+) ip (?P<ip>\S+) sp (?P<sp>\S+) error (?P<error>\d+) in (?P<binary>\S+)'
    tags: ["syslog", "kernel"]
    severity: "medium"
    enabled: true

  - name: "NFS Mount Error"
    description: "NFS client mount or I/O error"
    pattern: 'nfs: server (?P<server>\S+) not responding'
    tags: ["syslog", "kernel"]
    severity: "high"
    enabled: true

  # Kernel — Alpine (kern.log doesn't exist, syslog-only, yes we need duplicates, no there's no better way)

  - name: "OOM Killer Invoked"
    description: "Linux OOM killer terminated a process"
    pattern: 'Out of memory: Kill process (?P<pid>\d+) \((?P<process>[^)]+)\)'
    tags: ["syslog"]
    platforms: ["alpine"]
    severity: "high"
    enabled: true

  - name: "Kernel Panic"
    description: "Kernel panic detected in logs"
    pattern: 'Kernel panic'
    tags: ["syslog"]
    platforms: ["alpine"]
    severity: "critical"
    enabled: true

  - name: "Kernel BUG"
    description: "Kernel BUG() detected"
    pattern: 'kernel BUG at'
    tags: ["syslog"]
    platforms: ["alpine"]
    severity: "critical"
    enabled: true

  - name: "Disk I/O Error"
    description: "Block device reported an I/O error"
    pattern: '(?:end_request: I/O error|Buffer I/O error on device|SCSI error|ata\d+\.00: exception)'
    tags: ["syslog"]
    platforms: ["alpine"]
    severity: "high"
    enabled: true

  - name: "Segfault"
    description: "Process segmentation fault"
    pattern: 'segfault at (?P<addr>\S+) ip (?P<ip>\S+) sp (?P<sp>\S+) error (?P<error>\d+) in (?P<binary>\S+)'
    tags: ["syslog"]
    platforms: ["alpine"]
    severity: "medium"
    enabled: true

  # Cron — Debian / Ubuntu / Arch

  - name: "Crontab Modified"
    description: "A crontab file was installed or modified"
    pattern: '\((?P<username>[^)]+)\) REPLACE \((?P<file>[^)]+)\)'
    tags: ["syslog", "cron"]
    platforms: ["debian", "ubuntu", "arch", "linuxmint", "pop", "kali", "raspbian"]
    severity: "medium"
    enabled: true

  - name: "Cron Command Executed"
    description: "Cron executed a job (informational)"
    pattern: '\((?P<username>[^)]+)\) CMD \((?P<command>.+)\)'
    tags: ["syslog", "cron"]
    platforms: ["debian", "ubuntu", "arch", "linuxmint", "pop", "kali", "raspbian"]
    severity: "info"
    enabled: false

  # Cron — Alpine / RHEL

  - name: "Crontab Modified"
    description: "A crontab file was installed or modified"
    pattern: '\((?P<username>[^)]+)\) REPLACE \((?P<file>[^)]+)\)'
    tags: ["syslog"]
    platforms: ["alpine", "rhel", "centos", "fedora", "rocky", "almalinux", "ol", "amzn"]
    severity: "medium"
    enabled: true

  # Packages — Debian / Ubuntu (dpkg)

  - name: "Package Installed (dpkg)"
    description: "A new package was installed via dpkg/apt"
    pattern: 'status installed (?P<package>\S+):(?P<arch>\S+) (?P<version>\S+)'
    tags: ["syslog", "packages"]
    platforms: ["debian", "ubuntu", "linuxmint", "pop", "kali", "raspbian"]
    severity: "info"
    enabled: true

  - name: "Package Removed (dpkg)"
    description: "A package was removed via dpkg/apt"
    pattern: 'status (?:not-installed|config-files|half-installed) (?P<package>\S+)'
    tags: ["syslog", "packages"]
    platforms: ["debian", "ubuntu", "linuxmint", "pop", "kali", "raspbian"]
    severity: "info"
    enabled: true

  # Packages — Alpine (apk)

  - name: "Package Installed (apk)"
    description: "A new package was installed via apk"
    pattern: 'Installing (?P<package>\S+) \((?P<version>[^)]+)\)'
    tags: ["syslog"]
    platforms: ["alpine"]
    severity: "info"
    enabled: true

  - name: "Package Removed (apk)"
    description: "A package was removed via apk"
    pattern: 'Purging (?P<package>\S+) \((?P<version>[^)]+)\)'
    tags: ["syslog"]
    platforms: ["alpine"]
    severity: "info"
    enabled: true

  # Docker — global

  - name: "Docker Privileged Container Started"
    description: "A Docker container was started with --privileged"
    pattern: 'create.*?"Privileged":true'
    tags: ["docker"]
    severity: "high"
    enabled: true

  - name: "Docker Container OOM Killed"
    description: "Docker container was killed by the OOM killer"
    pattern: '(?i)oom.kill|memory limit exceeded'
    tags: ["docker"]
    severity: "high"
    enabled: true

  - name: "Docker Image Pull"
    description: "Docker image pull (informational / unexpected registry check)"
    pattern: 'Pulling from (?P<image>\S+)'
    tags: ["docker"]
    severity: "info"
    enabled: true

  - name: "Docker Exec in Container"
    description: "docker exec was run inside a container"
    pattern: '(?i)docker exec|exec_create|exec_start'
    tags: ["docker"]
    severity: "low"
    enabled: true

  # Network — global

  - name: "iptables DROPPED"
    description: "iptables dropped a packet (firewall block)"
    pattern: 'IN=(?P<in_iface>\S+) OUT=(?P<out_iface>\S*) MAC=\S+ SRC=(?P<src>[\d.a-f:]+) DST=(?P<dst>[\d.a-f:]+).*DPT=(?P<dport>\d+)'
    tags: ["syslog", "kernel"]
    severity: "info"
    enabled: true

  - name: "Port Scan Detected (SYN flood)"
    description: "Possible port scan — repeated SYN connections from same source"
    pattern: 'SYN_RECV.*SRC=(?P<src>[\d.a-f:]+)'
    tags: ["syslog", "kernel"]
    severity: "medium"
    enabled: false  # can be noisy; enable if needed

  # iptables — Alpine variant
  - name: "iptables DROPPED"
    description: "iptables dropped a packet (firewall block)"
    pattern: 'IN=(?P<in_iface>\S+) OUT=(?P<out_iface>\S*) MAC=\S+ SRC=(?P<src>[\d.a-f:]+) DST=(?P<dst>[\d.a-f:]+).*DPT=(?P<dport>\d+)'
    tags: ["syslog"]
    platforms: ["alpine"]
    severity: "info"
    enabled: true
