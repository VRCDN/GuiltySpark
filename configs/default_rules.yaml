# GuiltySpark — Default Log Scanning Rules
# Seeded automatically on first run.
#
# tags: scope a rule to log sources sharing at least one tag.
# platforms: optional OS filter (ID= from /etc/os-release). Omit for global rules.
#
# Alpine shoves everything into /var/log/messages with tag [syslog], so rules
# that normally use [sshd, auth, pam] etc. need Alpine-specific variants below.

rules:

  # SSH — Debian / Ubuntu / Arch

  - name: "SSH Failed Password"
    description: "Failed password authentication via SSH"
    pattern: 'Failed password for (invalid user )?(?P<username>\S+) from (?P<ip>[\d.a-f:]+) port (?P<port>\d+)'
    tags: ["sshd", "auth"]
    platforms: ["debian", "ubuntu", "arch", "linuxmint", "pop", "kali", "raspbian"]
    severity: "medium"
    enabled: true

  - name: "SSH Invalid User"
    description: "SSH login attempt using a non-existent username"
    pattern: 'Invalid user (?P<username>\S+) from (?P<ip>[\d.a-f:]+)'
    tags: ["sshd", "auth"]
    platforms: ["debian", "ubuntu", "arch", "linuxmint", "pop", "kali", "raspbian"]
    severity: "medium"
    enabled: true

  - name: "SSH Root Login Accepted"
    description: "Root login accepted via SSH — should be disabled"
    pattern: 'Accepted (?:password|publickey) for root from (?P<ip>[\d.a-f:]+)'
    tags: ["sshd", "auth"]
    platforms: ["debian", "ubuntu", "arch", "linuxmint", "pop", "kali", "raspbian"]
    severity: "high"
    enabled: true

  - name: "SSH Login Accepted"
    description: "Successful SSH login (informational)"
    pattern: 'Accepted (?:password|publickey|keyboard-interactive) for (?P<username>\S+) from (?P<ip>[\d.a-f:]+) port (?P<port>\d+)'
    tags: ["sshd", "auth"]
    platforms: ["debian", "ubuntu", "arch", "linuxmint", "pop", "kali", "raspbian"]
    severity: "info"
    enabled: true

  - name: "SSH Connection Closed by Invalid User"
    description: "Connection closed before authentication completed for invalid user"
    pattern: 'Connection closed by invalid user (?P<username>\S+) (?P<ip>[\d.a-f:]+)'
    tags: ["sshd", "auth"]
    platforms: ["debian", "ubuntu", "arch", "linuxmint", "pop", "kali", "raspbian"]
    severity: "low"
    enabled: true

  - name: "SSH Too Many Authentication Failures"
    description: "Possible SSH brute force — too many auth failures"
    pattern: 'Too many authentication failures for (?P<username>\S+)'
    tags: ["sshd", "auth"]
    platforms: ["debian", "ubuntu", "arch", "linuxmint", "pop", "kali", "raspbian"]
    severity: "high"
    enabled: true

  - name: "SSH Possible Break-In Attempt"
    description: "Reverse mapping check failed — possible spoofed IP"
    pattern: 'POSSIBLE BREAK-IN ATTEMPT'
    tags: ["sshd", "auth"]
    platforms: ["debian", "ubuntu", "arch", "linuxmint", "pop", "kali", "raspbian"]
    severity: "high"
    enabled: true

  # SSH — RHEL / CentOS / Fedora

  - name: "SSH Failed Password"
