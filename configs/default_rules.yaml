  # PAM / Auth — Alpine

  - name: "PAM Authentication Failure"
    description: "PAM subsystem reported an authentication failure"
    pattern: 'pam_unix\(\S+\): authentication failure;.*?user=(?P<username>\S*)'
    tags: ["syslog"]
    platforms: ["alpine"]
    severity: "medium"
    enabled: true

  - name: "Sudo Command Executed"
    description: "User executed a command with sudo"
