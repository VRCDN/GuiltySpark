# GuiltySpark Agent — fill in collector URL and registration_key, everything else has sane defaults.

collector:
  url: "https://collector.example.com:9900"
  timeout: "30s"
  tls:
    ca_cert: ""        # custom CA bundle; leave blank for system pool
    skip_verify: false # don't touch this in prod

auth:
  api_key: ""          # populated automatically on first registration
  registration_key: "CHANGE_ME_must_match_collector_registration_key"

agent:
  id: ""               # populated automatically
  tags:
    - "production"
    - "linux"
  region: "us-east-1"

heartbeat:
  interval: "30s"

# Rules match against log sources by tag — a rule fires only when at least one
# of its tags overlaps with the source's tags. Non-existent paths are ignored.
log_sources:

  # Debian / Ubuntu
  - path: "/var/log/syslog"
    tags: ["syslog", "cron", "daemon"]
  - path: "/var/log/auth.log"
    tags: ["syslog", "sshd", "auth", "pam", "sudo"]
  - path: "/var/log/kern.log"
    tags: ["syslog", "kernel"]
  - path: "/var/log/dpkg.log"
    tags: ["syslog", "packages"]

  # RHEL / CentOS / Fedora
  - path: "/var/log/messages"
    tags: ["syslog", "kernel", "cron", "daemon"]
  - path: "/var/log/secure"
    tags: ["syslog", "sshd", "auth", "pam", "sudo"]
  - path: "/var/log/audit/audit.log"
    tags: ["auth", "audit"]

  # Alpine — BusyBox dumps everything into one file with no facility splitting,
  # so just tag it "syslog" and let the platform-scoped rules on the collector
  # sort it out. Yes, this is annoying. No, there isn't a cleaner way without
  # replacing BusyBox syslogd with syslog-ng and reconfiguring everything.
  - path: "/var/log/messages"
    tags: ["syslog"]

  # Arch (journald by default — these only exist if you've set up rsyslog/syslog-ng)
  # - path: "/var/log/syslog.log"
  #   tags: ["syslog", "cron", "daemon"]
  # - path: "/var/log/auth.log"
  #   tags: ["syslog", "sshd", "auth", "pam", "sudo"]

docker:
  enabled: true
  socket: "/var/run/docker.sock"
  container_tags:
    - "docker"

inventory:
  enabled: true
  interval: "1h"

audit:
  enabled: true
  file_watch:
    enabled: true
    paths:
      - "/etc"
      - "/usr/bin"
      - "/usr/sbin"
      - "/bin"
      - "/sbin"
      - "/root"
      - "/home"
  exec:
    enabled: true # needs CAP_AUDIT_READ + CAP_AUDIT_WRITE; falls back to tailing audit.log

state_file: "/var/lib/guiltyspark-agent/state.json"

log_level:  "info"   # debug | info | warn | error
log_format: "json"   # json | text
log_file:   "/var/log/guiltyspark/agent.log"
