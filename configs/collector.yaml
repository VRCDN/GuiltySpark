# GuiltySpark Collector — Reference Configuration
# All fields shown; most have reasonable defaults.

server:
  host: "0.0.0.0"
  port: 9900
  tls:
    enabled: true
    cert_file: "/etc/guiltyspark/tls/collector.crt"
    key_file:  "/etc/guiltyspark/tls/collector.key"

database:
  # Path to the SQLite database file.
  # Directory is created automatically if it does not exist.
  path: "/var/lib/guiltyspark/collector.db"

auth:
  # Generate a strong random key: openssl rand -hex 32
  # This key is required for all management (admin) API requests.
  admin_api_key: "CHANGE_ME_generate_a_strong_admin_api_key"

  # Agents must supply this key in their registration request.
  # Leave blank to allow any agent to register (not recommended in production).
  # Generate one with: openssl rand -hex 32
  registration_key: "CHANGE_ME_generate_a_strong_registration_key"

heartbeat:
  # How long since the last heartbeat before an agent is marked offline.
  timeout: "90s"
  # How often to check all agents for missed heartbeats.
  check_interval: "30s"

alerts:
  # How long to suppress duplicate alerts for the same rule+agent pair.
  dedup_window: "5m"
  notifications:
    webhook:
      enabled: false
      # URL to POST alert JSON to.
      url: "https://your-endpoint.example.com/guiltyspark"
      # Optional HMAC-SHA256 signing secret.
      # The signature is sent in the X-GuiltySpark-Signature header.
      secret: ""
      # Only fire for this severity and above: info | low | medium | high | critical
      # Leave unset (or empty) to receive everything.
      min_level: ""

    email:
      enabled: false
      smtp_host: "smtp.example.com"
      smtp_port: 587
      from: "guiltyspark@example.com"
      to:
        - "admin@example.com"
      # SMTP AUTH credentials (leave blank for no auth / relay)
      username: ""
      password: ""
      min_level: "high"  # email is noisy — only send high and critical by default

    slack:
      enabled: false
      # Slack Incoming Webhook URL
      webhook_url: "https://hooks.slack.com/services/XXX/YYY/ZZZ"
      min_level: ""  # empty = all severities

    discord:
      enabled: false
      # Discord channel Incoming Webhook URL
      webhook_url: "https://discord.com/api/webhooks/<id>/<token>"
      # Optional: override the bot display name shown in Discord.
      # username: "GuiltySpark"
      min_level: ""  # empty = all severities

    # custom_webhooks lets you define fully templated outbound HTTP requests.
    # The body_template is a Go text/template that renders to a YAML document;
    # it is automatically converted to JSON before sending (unless you set
    # content_type to something other than application/json).
    #
    # Available template variables:
    #   .ID  .AgentID  .RuleID  .RuleName  .Severity  .AlertType
    #   .Message  .LogLine  .LogSource  .MatchedAt  .ReceivedAt
    # Built-in functions: upper, lower
    #
    # custom_webhooks:
    #   - name: "PagerDuty"
    #     enabled: true
    #     url: "https://events.pagerduty.com/v2/enqueue"
    #     min_level: "high"  # only page on high/critical
    #     headers:
    #       Authorization: "Token token=YOUR_PAGERDUTY_INTEGRATION_KEY"
    #     body_template: |
    #       routing_key: "YOUR_ROUTING_KEY"
    #       event_action: "trigger"
    #       payload:
    #         summary: "{{ .Message }}"
    #         severity: "{{ lower .Severity }}"
    #         source: "{{ .AgentID }}"
    #         custom_details:
    #           rule_name: "{{ .RuleName }}"
    #           alert_type: "{{ .AlertType }}"
    #           log_line: "{{ .LogLine }}"
    #
    #   - name: "Teams"
    #     enabled: true
    #     url: "https://outlook.office.com/webhook/..."
    #     min_level: "medium"
    #     body_template: |
    #       "@type": "MessageCard"
    #       "@context": "http://schema.org/extensions"
    #       themeColor: "e74c3c"
    #       summary: "{{ .Message }}"
    #       sections:
    #         - activityTitle: "[{{ upper .Severity }}] {{ .AlertType }}"
    #           activityText: "{{ .Message }}"
    #           facts:
    #             - name: Agent
    #               value: "{{ .AgentID }}"
    #             - name: Rule
    #               value: "{{ .RuleName }}"

# The region label attached to all agents that register with this collector.
region: "us-east-1"

log_level:  "info"   # debug | info | warn | error
log_format: "json"   # json | text
log_file:   "/var/log/guiltyspark/collector.log"  # set empty to disable file logging

# Optional: path to a YAML file containing default log scanning rules.
# If the database is empty, these rules are seeded automatically on startup.
default_rules_file: "configs/default_rules.yaml"
