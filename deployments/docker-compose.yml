version: "3.9"

# ---------------------------------------------------------------------------
# GuiltySpark — docker-compose deployment
#
# Brings up:
#   - guiltyspark-collector  (API + storage)
#   - traefik                (TLS termination / reverse proxy)
#
# The agent is intentionally NOT included here.  Agents run on every
# monitored host and are deployed separately (see the systemd unit or the
# install.sh script).  However, a single-host development override is
# provided in docker-compose.dev.yml.
# ---------------------------------------------------------------------------

services:

  # -------------------------------------------------------------------------
  # Collector
  # -------------------------------------------------------------------------
  collector:
    image: guiltyspark-collector:${VERSION:-latest}
    build:
      context: ..
      dockerfile: deployments/Dockerfile.collector
      args:
        VERSION: ${VERSION:-dev}
    container_name: guiltyspark-collector
    restart: unless-stopped
    environment:
      # Override any config-file value with environment variables if needed.
      - TZ=${TZ:-UTC}
    volumes:
      # Persistent SQLite database
      - collector_data:/var/lib/guiltyspark
      # Drop a custom collector.yaml here to override defaults
      - ${CONFIG_DIR:-./config}:/etc/guiltyspark:ro
    networks:
      - guiltyspark
    # Expose the API only on the internal network; Traefik forwards to it.
    expose:
      - "8080"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.collector.rule=Host(`${COLLECTOR_DOMAIN:-collector.example.com}`)"
      - "traefik.http.routers.collector.entrypoints=websecure"
      - "traefik.http.routers.collector.tls.certresolver=letsencrypt"
      - "traefik.http.services.collector.loadbalancer.server.port=8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # -------------------------------------------------------------------------
  # Traefik — TLS termination + reverse proxy
  # -------------------------------------------------------------------------
  traefik:
    image: traefik:v3.1
    container_name: guiltyspark-traefik
    restart: unless-stopped
    command:
      - "--api.dashboard=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--providers.docker=true"
      - "--providers.docker.network=guiltyspark"
      - "--providers.docker.exposedbydefault=false"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:-admin@example.com}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--log.level=INFO"
      - "--accesslog=true"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt
    networks:
      - guiltyspark
    depends_on:
      - collector

volumes:
  collector_data:
    driver: local
  letsencrypt:
    driver: local

networks:
  guiltyspark:
    driver: bridge
