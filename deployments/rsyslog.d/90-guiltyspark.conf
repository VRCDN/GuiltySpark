# GuiltySpark — rsyslog routing configuration
#
# Drop this file into /etc/rsyslog.d/ on distributions that do not create
# /var/log/auth.log or /var/log/kern.log by default (e.g. Arch Linux, RHEL
# with rsyslog replacing journald-only setups).
#
# After installing, restart rsyslog:
#   systemctl restart rsyslog
#   rc-service rsyslog restart   (OpenRC)

# Kernel messages
kern.*    -/var/log/kern.log

# Auth, sudo, PAM, SSH
auth,authpriv.*    /var/log/auth.log

# General syslog (exclude already-routed facilities to avoid duplication)
*.*;auth,authpriv.none;kern.none    -/var/log/syslog

# Ensure the files are created with sensible permissions
$FileCreateMode 0640
$DirCreateMode  0750
$Umask          0022
