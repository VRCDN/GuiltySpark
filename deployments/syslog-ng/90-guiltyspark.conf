# GuiltySpark — syslog-ng routing configuration
#
# Drop into /etc/syslog-ng/conf.d/ on Alpine Linux (or any syslog-ng host)
# to route auth, kernel, and syslog messages to flat files that GuiltySpark
# can read.
#
# After installing, restart syslog-ng:
#   rc-service syslog-ng restart
#   systemctl restart syslog-ng

# ---- Destinations -----------------------------------------------------------

destination d_guiltyspark_auth {
    file("/var/log/auth.log"
        perm(0640) dir_perm(0750) create_dirs(yes));
};

destination d_guiltyspark_kern {
    file("/var/log/kern.log"
        perm(0640) dir_perm(0750) create_dirs(yes));
};

destination d_guiltyspark_syslog {
    file("/var/log/syslog"
        perm(0640) dir_perm(0750) create_dirs(yes));
};

# ---- Filters ----------------------------------------------------------------

filter f_guiltyspark_auth   { facility(auth, authpriv); };
filter f_guiltyspark_kern   { facility(kern); };
filter f_guiltyspark_syslog { not facility(auth, authpriv, kern); };

# ---- Log paths --------------------------------------------------------------

log {
    source(src);    # 'src' is the default system source in Alpine syslog-ng
    filter(f_guiltyspark_auth);
    destination(d_guiltyspark_auth);
    flags(final);
};

log {
    source(src);
    filter(f_guiltyspark_kern);
    destination(d_guiltyspark_kern);
    flags(final);
};

log {
    source(src);
    filter(f_guiltyspark_syslog);
    destination(d_guiltyspark_syslog);
};
